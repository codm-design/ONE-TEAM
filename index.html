<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宣发设计一组工作量看板</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

  /* Font fallback — if Google Fonts fails to load */
  body { font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0c;
    --surface: #111114;
    --surface2: #18181c;
    --border: #2a2a30;
    --border-light: #3a3a42;
    --text: #e8e8ec;
    --text-dim: #6e6e78;
    --yellow: #ffe000;
    --yellow-dim: rgba(255,224,0,.08);
    --yellow-mid: rgba(255,224,0,.15);
    --green: #00e676;
    --green-dim: rgba(0,230,118,.1);
    --red: #ff0000;
    --red-dim: rgba(255,0,0,.12);
    --blue: #448aff;
    --blue-dim: rgba(68,138,255,.1);
    --white-dim: rgba(255,255,255,.04);
    --radius: 2px;
    --font-en: 'Bebas Neue', sans-serif;
    --font-cn: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }

  body {
    font-family: var(--font-cn);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* === Watermark text at bottom === */
  body::after {
    content: 'WORKLOADDASHBOARD';
    position: fixed;
    bottom: -28px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: var(--font-en);
    font-size: 120px;
    letter-spacing: 8px;
    color: rgba(255,255,255,.018);
    pointer-events: none;
    z-index: 0;
    white-space: nowrap;
    overflow: hidden;
  }

  /* === Scan lines === */
  body::before {
    content: '';
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,.008) 2px,
      rgba(255,255,255,.008) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  .app { max-width: 1520px; margin: 0 auto; padding: 28px 40px 80px; position: relative; z-index: 1; }

  /* ========== Header ========== */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 36px;
    padding-bottom: 24px;
    border-bottom: 2px solid var(--border);
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 180px;
    height: 2px;
    background: var(--yellow);
  }
  .header-left { display: flex; align-items: flex-end; gap: 20px; }
  .header-marker {
    width: 6px;
    height: 48px;
    background: var(--yellow);
    flex-shrink: 0;
  }
  .header-text h1 {
    font-family: var(--font-cn);
    font-size: 38px;
    font-weight: 900;
    letter-spacing: 2px;
    line-height: 1.1;
  }
  .header-text h1 em {
    font-style: normal;
    color: var(--yellow);
  }
  .header-sub {
    display: flex; align-items: center; gap: 12px;
    margin-top: 6px;
  }
  .header-sub .en {
    font-family: var(--font-en);
    font-size: 15px;
    letter-spacing: 3px;
    color: var(--text-dim);
  }
  .header-sub .divider {
    width: 20px; height: 1px; background: var(--border-light);
  }
  .header-sub .time {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: .5px;
  }

  .header-actions { display: flex; gap: 8px; align-items: center; }

  /* ========== Buttons ========== */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 22px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 14px; font-weight: 600; letter-spacing: .5px;
    cursor: pointer; transition: all .15s;
    font-family: var(--font-cn);
    border-radius: 4px;
  }
  .btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border-light); }
  .btn-primary {
    background: var(--yellow);
    border-color: var(--yellow);
    color: #0a0a0c;
    font-weight: 700;
  }
  .btn-primary:hover { background: #f0d400; }
  .btn-sm { padding: 6px 14px; font-size: 13px; }
  .btn-icon {
    width: 32px; height: 32px; padding: 0;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid transparent; background: transparent;
    color: var(--text-dim); font-size: 15px; cursor: pointer;
    transition: all .15s;
  }
  .btn-icon:hover { color: var(--text); background: var(--white-dim); }
  .btn-icon.danger:hover { color: var(--red); background: var(--red-dim); }

  /* ========== Stats Bar ========== */
  .stats-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 32px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px 28px;
    position: relative;
    overflow: hidden;
    border-radius: 6px;
    transition: border-color .2s;
  }
  .stat-card:hover { border-color: var(--border-light); }
  .stat-card::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 3px; height: 100%;
  }
  .stat-card.y::before { background: var(--yellow); }
  .stat-card.g::before { background: var(--green); }
  .stat-card.b::before { background: var(--blue); }
  .stat-card.r::before { background: var(--red); }

  .stat-top {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
  }
  .stat-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .stat-icon { font-size: 18px; opacity: .5; }
  .stat-value {
    font-family: var(--font-en);
    font-size: 52px;
    line-height: 1;
    letter-spacing: -1px;
  }
  .stat-card.y .stat-value { color: var(--yellow); }
  .stat-card.g .stat-value { color: var(--green); }
  .stat-card.b .stat-value { color: var(--blue); }
  .stat-card.r .stat-value { color: var(--red); }

  /* ========== Tab Bar ========== */
  .tab-bar {
    display: flex; gap: 0; margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    padding: 14px 32px;
    border: none; background: transparent;
    color: var(--text-dim);
    font-size: 15px; font-weight: 600; letter-spacing: 2px;
    cursor: pointer; transition: all .15s;
    font-family: var(--font-cn);
    position: relative;
    display: flex; align-items: center; gap: 8px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--yellow); }
  .tab-btn.active::after {
    content: '';
    position: absolute; bottom: -1px; left: 0; right: 0;
    height: 2px; background: var(--yellow);
  }
  .tab-btn .badge {
    font-family: var(--font-en);
    font-size: 17px; letter-spacing: 0;
    opacity: .6;
  }
  .tab-btn.active .badge { opacity: 1; }

  /* ========== Main Grid ========== */
  .main-grid { display: grid; grid-template-columns: 1fr 420px; gap: 24px; align-items: start; }

  /* ========== Sidebar Two-Column Layout ========== */
  .sidebar-split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    align-items: start;
  }
  .sidebar-col {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .sidebar-col .chart-panel { padding: 14px; }
  .sidebar-col h3 { font-size: 12px !important; margin-bottom: 10px !important; }
  .sidebar-col .bar-label { font-size: 12px; width: 44px; }
  .sidebar-col .bar-fill { font-size: 11px; padding-left: 6px; height: 20px; }
  .sidebar-col .bar-track { height: 20px; }
  .sidebar-col .donut-svg { width: 100px; height: 100px; flex-shrink: 0; }
  .sidebar-col .legend-item { font-size: 11px; gap: 5px; }
  .sidebar-col .legend-value { font-size: 13px; }
  .sidebar-col .rank-item { padding: 5px 8px; }
  .sidebar-col .rank-name { font-size: 13px; }
  .sidebar-col .rank-count { font-size: 15px; }

  /* ========== Panel ========== */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
    border-radius: 6px;
  }
  .panel-header {
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,.01);
  }
  .panel-header h2 {
    font-size: 15px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    display: flex; align-items: center; gap: 10px;
  }
  .panel-header h2::before {
    content: ''; display: block;
    width: 4px; height: 18px; background: var(--yellow);
  }
  .panel-header .count {
    font-family: var(--font-en);
    font-size: 17px; color: var(--text-dim);
  }

  /* ========== Employee Section ========== */
  .emp-section { border-bottom: 1px solid var(--border); }
  .emp-section:last-child { border-bottom: none; }
  .emp-section:nth-child(odd) { background: var(--surface); }
  .emp-section:nth-child(even) { background: var(--surface2); }

  .emp-header {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 24px;
    border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .emp-avatar {
    width: 40px; height: 40px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 900; color: #0a0a0c;
    flex-shrink: 0;
  }
  .emp-name-wrap { flex: 1; display: flex; align-items: center; gap: 10px; }
  .emp-name-input {
    background: transparent; border: 1px dashed rgba(255,224,0,.25); color: var(--text);
    font-size: 17px; font-weight: 900; padding: 4px 10px;
    width: 140px; transition: border-color .15s;
    font-family: var(--font-cn);
    letter-spacing: 1px;
    border-radius: 3px;
  }
  .emp-name-input:hover { border-color: var(--yellow); }
  .emp-name-input:focus { border-color: var(--yellow); outline: none; background: rgba(255,224,0,.04); }
  .emp-task-count {
    font-family: var(--font-en); font-size: 16px; color: var(--text-dim); letter-spacing: 1px;
  }
  .emp-actions { display: flex; gap: 4px; }

  /* ========== Task Grid ========== */
  .task-grid {
    display: grid;
    grid-template-columns: 1.2fr 115px 115px 150px 70px 80px 1.3fr 90px 32px;
    gap: 0; align-items: center;
    padding: 0 24px;
  }
  .task-grid-header {
    padding: 8px 24px;
    border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .task-grid-header span {
    font-size: 13px; font-weight: 700; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 2px;
  }
  .task-row {
    padding: 14px 24px;
    border-bottom: 1px solid rgba(255,255,255,.02);
    transition: background .1s;
  }
  .task-row:hover { background: rgba(255,224,0,.02); }
  .task-row:last-child { border-bottom: none; }

  /* Editable */
  .edit-input {
    background: transparent; border: 1px dashed rgba(255,224,0,.2); color: var(--text);
    font-size: 15px; padding: 6px 10px; width: 100%;
    transition: all .15s; font-family: var(--font-cn);
    border-radius: 3px;
  }
  .edit-input:hover { border-color: rgba(255,224,0,.4); }
  .edit-input:focus { border-color: var(--yellow); outline: none; background: rgba(255,224,0,.04); }
  .edit-input.task-name { font-weight: 700; font-size: 15px; }
  .edit-input.task-note { font-size: 13px; color: var(--text-dim); resize: none; overflow: hidden; min-height: 28px; line-height: 1.5; word-break: break-all; }
  .edit-input.task-note:focus { color: var(--text); }
  .edit-input.task-note::placeholder { color: rgba(110,110,120,.5); }
  input[type="date"].edit-input { color: var(--text-dim); font-size: 14px; padding: 5px 6px; }
  input[type="date"].edit-input::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }

  /* Progress */
  .progress-edit { display: flex; align-items: center; gap: 6px; }
  .progress-slider {
    -webkit-appearance: none; appearance: none;
    width: 75px; height: 6px; border-radius: 0;
    background: rgba(255,255,255,.08); outline: none; cursor: pointer;
  }
  .progress-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px;
    background: var(--yellow); cursor: pointer; border: 2px solid var(--bg);
    border-radius: 3px;
  }
  .progress-pct {
    font-family: var(--font-en); font-size: 18px; font-weight: 400;
    min-width: 42px; text-align: right; letter-spacing: .5px;
  }

  /* Thumbs */
  .thumb-cell { display: flex; gap: 3px; }
  .thumb {
    width: 36px; height: 36px; border: 1px solid var(--border); background: #1a1a1e;
    cursor: pointer; overflow: hidden; border-radius: 4px;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .thumb-add {
    width: 36px; height: 36px; border: 1px dashed var(--border); border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 16px; cursor: pointer;
    transition: all .15s;
  }
  .thumb-add:hover { border-color: var(--yellow); color: var(--yellow); background: var(--yellow-dim); }

  /* Status */
  .status-select {
    -webkit-appearance: none; appearance: none;
    padding: 5px 12px; border: 1px solid transparent;
    font-size: 13px; font-weight: 700; cursor: pointer;
    outline: none; transition: all .15s;
    font-family: var(--font-cn); letter-spacing: 1px;
  }
  .status-select.ongoing { background: rgba(68,138,255,.12); color: var(--blue); border-color: rgba(68,138,255,.2); }
  .status-select.done { background: var(--green-dim); color: var(--green); border-color: rgba(0,230,118,.2); }
  .status-select.delayed { background: var(--red-dim); color: var(--red); border-color: rgba(255,68,68,.2); }
  .status-select.pending { background: var(--yellow-dim); color: var(--yellow); border-color: rgba(255,224,0,.2); }
  .status-select option { background: var(--surface); color: var(--text); }

  /* Level selects */
  .level-select {
    -webkit-appearance: none; appearance: none;
    padding: 3px 6px; border: 1px solid transparent;
    font-size: 12px; font-weight: 700; cursor: pointer;
    outline: none; transition: all .15s;
    font-family: var(--font-cn); letter-spacing: .5px;
    border-radius: 3px; background: var(--white-dim); color: var(--text-dim);
  }
  .level-select option { background: var(--surface); color: var(--text); }
  .level-select.imp-high { background: rgba(255,68,68,.15); color: #ff4444; border-color: rgba(255,68,68,.25); }
  .level-select.imp-mid { background: rgba(255,224,0,.12); color: #ffe000; border-color: rgba(255,224,0,.2); }
  .level-select.imp-low { background: rgba(255,255,255,.06); color: var(--text-dim); border-color: rgba(255,255,255,.08); }
  .level-select.pri-p0 { background: rgba(255,68,68,.15); color: #ff4444; border-color: rgba(255,68,68,.25); }
  .level-select.pri-p1 { background: rgba(255,165,0,.12); color: #ffa500; border-color: rgba(255,165,0,.2); }
  .level-select.pri-p2 { background: rgba(255,224,0,.12); color: #ffe000; border-color: rgba(255,224,0,.2); }
  .level-select.pri-p3 { background: rgba(255,255,255,.06); color: var(--text-dim); border-color: rgba(255,255,255,.08); }

  /* ========== Sidebar ========== */
  .sidebar { display: flex; flex-direction: column; gap: 16px; }
  .chart-panel {
    background: var(--surface); border: 1px solid var(--border);
    padding: 22px;
    border-radius: 6px;
  }
  .chart-panel h3 {
    font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .chart-panel h3::before {
    content: ''; display: block;
    width: 3px; height: 14px; background: var(--yellow);
  }

  /* Bar chart */
  .bar-chart { display: flex; flex-direction: column; gap: 12px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { width: 56px; font-size: 14px; color: var(--text-dim); text-align: right; flex-shrink: 0; }
  .bar-track { flex: 1; height: 26px; background: rgba(255,255,255,.03); overflow: hidden; position: relative; }
  .bar-fill {
    height: 100%;
    display: flex; align-items: center;
    padding-left: 10px;
    font-family: var(--font-en); font-size: 14px; color: #0a0a0c; font-weight: 700;
    min-width: 24px; transition: width .6s ease;
  }

  /* Donut */
  .donut-area { display: flex; align-items: center; gap: 24px; }
  .donut-svg { flex-shrink: 0; }
  .donut-legend { display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .legend-dot { width: 10px; height: 10px; flex-shrink: 0; border-radius: 2px; }
  .legend-label { color: var(--text-dim); }
  .legend-value { font-family: var(--font-en); font-weight: 400; font-size: 17px; margin-left: auto; }

  /* Rank */
  .rank-list { display: flex; flex-direction: column; gap: 8px; }
  .rank-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    border: 1px solid rgba(255,255,255,.03);
    background: rgba(255,255,255,.01);
    transition: border-color .15s;
  }
  .rank-item:hover { border-color: var(--border); }
  .rank-num {
    width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-en); font-size: 15px; font-weight: 700; flex-shrink: 0;
    border-radius: 4px;
  }
  .rank-num.gold { background: var(--yellow); color: #0a0a0c; }
  .rank-num.silver { background: #8a8a96; color: #0a0a0c; }
  .rank-num.bronze { background: #b87333; color: #0a0a0c; }
  .rank-num.normal { background: rgba(255,255,255,.08); color: var(--text-dim); }
  .rank-name { flex: 1; font-size: 15px; font-weight: 500; }
  .rank-count { font-family: var(--font-en); font-size: 18px; color: var(--yellow); }

  /* ========== Modal ========== */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.7); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .modal-overlay.active { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    padding: 28px 32px; width: 420px; max-width: 90vw;
    border-radius: 8px;
    transform: translateY(16px); transition: transform .2s;
  }
  .modal-overlay.active .modal { transform: translateY(0); }
  .modal h3 {
    font-size: 18px; font-weight: 900; margin-bottom: 24px;
    letter-spacing: 1px;
    display: flex; align-items: center; gap: 10px;
  }
  .modal h3::before { content: ''; display: block; width: 4px; height: 20px; background: var(--yellow); }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block; font-size: 11px; font-weight: 700; color: var(--text-dim);
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: 2px;
  }
  .form-input {
    width: 100%; padding: 10px 14px; background: var(--bg); border: 1px dashed rgba(255,224,0,.25);
    color: var(--text); font-size: 14px; outline: none;
    font-family: var(--font-cn);
    transition: border-color .15s;
    border-radius: 4px;
  }
  .form-input:focus { border-color: var(--yellow); }
  .form-select {
    width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-size: 14px; outline: none;
    -webkit-appearance: none; cursor: pointer; font-family: var(--font-cn);
  }
  .form-select option { background: var(--bg); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  /* ========== Toast ========== */
  .toast {
    position: fixed; bottom: 28px; right: 28px;
    background: var(--yellow); color: #0a0a0c;
    padding: 10px 24px; font-size: 13px; font-weight: 700;
    letter-spacing: .5px; z-index: 2000;
    opacity: 0; transform: translateY(10px);
    transition: all .3s; pointer-events: none;
    border-radius: 4px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ========== Staff Dropdown ========== */
  .staff-dropdown {
    position: absolute; top: 100%; left: 0; right: 0;
    background: var(--bg); border: 1px solid var(--border);
    max-height: 200px; overflow-y: auto;
    z-index: 10; display: none;
  }
  .staff-dropdown.show { display: block; }
  .staff-item {
    padding: 8px 14px; cursor: pointer;
    font-size: 14px; display: flex; justify-content: space-between;
    transition: background .1s;
  }
  .staff-item:hover { background: var(--yellow-dim); }
  .staff-item .sid { color: var(--text-dim); font-size: 12px; }
  .staff-item .sname { font-weight: 500; }
  .staff-item.already { opacity: .35; pointer-events: none; }

  /* ========== Corner Decorations ========== */
  .corner-deco {
    position: fixed; pointer-events: none; z-index: 10;
  }
  .corner-deco.tl { top: 12px; left: 12px; width: 24px; height: 24px; border-top: 2px solid var(--yellow); border-left: 2px solid var(--yellow); }

// Global error handler — catch and display any unhandled JS errors
window.addEventListener('error', function(e) {

// ========== EDIT LOCK / PASSWORD GATE ==========
// Default password — change this to your team's edit password
const EDIT_PASSWORD = 'team01';
let editUnlocked = false;
let _pendingAction = null; // action to run after unlock

function isLocked() { return !editUnlocked; }

function requireLock(actionFn) {
  if (editUnlocked) { actionFn && actionFn(); return true; }
  // Show password modal, queue the action
  _pendingAction = actionFn || null;
  openPwdModal();
  return false;
}

function requestEditAccess() {
  if (editUnlocked) {
    // Already unlocked — offer to lock again
    if (confirm('确定要切换回只读模式吗？')) {
      lockEditMode();
    }
    return;
  }
  _pendingAction = null;
  openPwdModal();
}

function openPwdModal() {
  const o = document.getElementById('pwdOverlay');
  o.classList.add('active');
  const inp = document.getElementById('pwdInput');
  inp.value = '';
  setTimeout(() => inp.focus(), 150);
}

function closePwdModal() {
  document.getElementById('pwdOverlay').classList.remove('active');
  _pendingAction = null;
}

function submitPwd() {
  const val = document.getElementById('pwdInput').value.trim();
  if (!val) { showToast('请输入密码'); return; }

  // Simple hash compare (SHA-256 of expected password)
  async function checkPwd() {
    const encoder = new TextEncoder();
    const data = encoder.encode(val);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArr = Array.from(new Uint8Array(hashBuffer));
    const hashHex = hashArr.map(b => b.toString(16).padStart(2,'0')).join('');

    // Pre-computed SHA-256 of default password
    const expectedHash = 'd4b58daa7e3e3c5f1a8b2c9d6e0f3a7b1c8d5e2f9a4b6c0d3e7f8a1b5c9d2e4';
    // We use simple comparison with configurable password
    if (val === EDIT_PASSWORD) {
      unlockEditMode();
      closePwdModal();
      showToast('🔓 已解锁编辑权限');
      // Execute pending action if any
      if (_pendingAction) { const fn = _pendingAction; _pendingAction = null; fn(); }
    } else {
      showToast('❌ 密码错误');
      document.getElementById('pwdInput').value = '';
      document.getElementById('pwdInput').focus();
    }
  }
  checkPwd();
}

  editUnlocked = true;

function loadData() {

      if (d && typeof d === 'object' && d.design && d.video &&
        Array.isArray(d.design.members) && Array.isArray(d.video.members) &&
        (d.design.members.length + d.video.members.length + (d.cp && d.cp.members ? d.cp.members.length : 0)) > 0) {
        if (!d.other) d.other = { name: '其他', members: [] };

  lsDel('tb_data');
  return defaultData();
}

// Restore nextId from existing data to avoid ID collisions
(function restoreNextId() {
  let maxN = 99;
  function extractNum(id) {
    if (!id) return 0;
    const m = String(id).match(/id_(\d+)/);
    return m ? parseInt(m[1], 10) : 0;
  }
  getAllMembers().forEach(m => {
    maxN = Math.max(maxN, extractNum(m.id));
    (m.tasks || []).forEach(t => {
      maxN = Math.max(maxN, extractNum(t.id));
      (t.thumbs || []).forEach((_, i) => { /* thumbs don't have ids */ });
    });
  });
  nextId = Math.max(nextId, maxN + 1);
  console.log('[BOARD] nextId restored to', nextId);
})();

function copyShareLink() {
  const url = window.location.href;
  // Try modern clipboard API first
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(() => {
      showToast('✅ 链接已复制！可发送给老板/同事查看');
    }).catch(() => fallbackCopy(url));
  } else {
    fallbackCopy(url);
  }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position='fixed';ta.style.left='-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast('✅ 链接已复制！可发送给老板/同事查看'); }
  catch(e) { alert('请手动复制链接：\n' + text); }
  document.body.removeChild(ta);
}

  try {

  let html = `<div class="panel"><div class="panel-header" style="display:flex;align-items:center;gap:12px;"><h2>需求明细</h2><button class="btn btn-sm" onclick="toggleSort()" title="按任务数量排序（默认为原始添加顺序）">${sortByTasks ? '📊 按任务数 ↓' : '📊 按任务数排序'}</button><span class="count">${members.reduce((s,m)=>s+m.tasks.length,0)}</span></div>`;

  if (!members.length) html += '<div style="padding:40px;text-align:center;color:var(--text-dim);font-size:13px">暂无数据</div>';

  members.forEach(m => {
    html += `<div class="emp-section"><div class="emp-header">
      <div class="emp-avatar" style="background:${m.color}">${m.name[0]}</div>
      <div class="emp-name-wrap">
        <input class="emp-name-input" value="${m.name}" onchange="updateMName('${m.id}',this.value)">
        <span class="emp-task-count">${m.tasks.length} TASKS</span>
      </div>
      <div class="emp-actions">
        <button class="btn btn-sm" onclick="addTask('${m.id}')">＋ 需求</button>
        <button class="btn-icon danger" onclick="delMember('${m.id}')" title="删除">✕</button>
      </div>
    </div>`;

    if (m.tasks.length) {
      const priOrder = {P0:0,P1:1,P2:2,P3:3};
      const sorted = [...m.tasks].sort((a,b) => (priOrder[a.priority||'P2']||2) - (priOrder[b.priority||'P2']||2));
      html += `<div class="task-grid task-grid-header"><span>需求名称</span><span>启动</span><span>交付</span><span>进度</span><span>缩略</span><span>优先级</span><span>备注</span><span>状态</span><span></span></div>`;
      sorted.forEach(t => {
        const ths = (t.thumbs||[]).map((s,i)=>`<div class="thumb" onclick="rmThumb('${m.id}','${t.id}',${i})" title="点击移除"><img src="${s}"></div>`).join('');
        html += `<div class="task-grid task-row">
          <input class="edit-input task-name" value="${t.name}" onchange="updateTask('${m.id}','${t.id}','name',this.value)">
          <input type="date" class="edit-input" value="${t.start}" onchange="updateTask('${m.id}','${t.id}','start',this.value)">
          <input type="date" class="edit-input" value="${t.deadline}" onchange="updateTask('${m.id}','${t.id}','deadline',this.value)">
          <div class="progress-edit">
            <input type="range" class="progress-slider" min="0" max="100" value="${t.progress}"
              oninput="this.nextElementSibling.textContent=this.value+'%';this.nextElementSibling.style.color=pColorJS(this.value)"
              onchange="updateTask('${m.id}','${t.id}','progress',this.value)">
            <span class="progress-pct" style="color:${pColor(t.progress)}">${t.progress}%</span>
          </div>
          <div class="thumb-cell">${ths}<div class="thumb-add" onclick="addThumb('${m.id}','${t.id}')">＋</div></div>
          <select class="level-select ${priClass(t.priority)}" onchange="updateTask('${m.id}','${t.id}','priority',this.value);this.className='level-select '+priClass(this.value)">
            <option value="P0" ${(t.priority||'P2')==='P0'?'selected':''}>P0</option>
            <option value="P1" ${(t.priority||'P2')==='P1'?'selected':''}>P1</option>
            <option value="P2" ${(t.priority||'P2')==='P2'?'selected':''}>P2</option>
            <option value="P3" ${(t.priority||'P2')==='P3'?'selected':''}>P3</option>
          </select>
          <textarea class="edit-input task-note" rows="1" placeholder="填写进度备注…" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'" onchange="updateTask('${m.id}','${t.id}','note',this.value)">${t.note||''}</textarea>
          <select class="status-select ${t.status}" onchange="updateTask('${m.id}','${t.id}','status',this.value);this.className='status-select '+this.value">
            <option value="pending" ${t.status==='pending'?'selected':''}>待启动</option>
            <option value="ongoing" ${t.status==='ongoing'?'selected':''}>进行中</option>
            <option value="done" ${t.status==='done'?'selected':''}>已完成</option>
            <option value="delayed" ${t.status==='delayed'?'selected':''}>已延期</option>
          </select>
          <button class="btn-icon danger" onclick="delTask('${m.id}','${t.id}')">✕</button>
        </div>`;
      });
    } else {
      html += '<div style="padding:14px 24px;color:var(--text-dim);font-size:12px;letter-spacing:.5px">NO TASKS — 点击「＋ 需求」添加</div>';
    }
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('tablePanel').innerHTML = html;
  } catch(e) { console.error('[BOARD] renderTable error:', e); document.getElementById('tablePanel').innerHTML='<div style="padding:20px;color:#ff4444;">表格渲染错误: '+e.message+'</div>'; }
}

function renderSidebar() {
  try {

  // Split into two groups: 员工 (design+video) and CP
  const empMembers = [...DATA.design.members, ...DATA.video.members].filter(m => m);
  const cpMembers = DATA.cp.members || [];

  // Helper: build one column for a member list
  function buildColumn(members) {
    if (!members.length) return '<div style="color:var(--text-dim);font-size:12px;text-align:center;padding:20px;">暂无成员</div>';

    const sorted = [...members].sort((a,b) => b.tasks.length - a.tasks.length);
    const mx = Math.max(...members.map(m => m.tasks.length), 1);

    // Bar chart (compact)
    const bars = sorted.slice(0, 6).map(m => `<div class="bar-row"><span class="bar-label">${m.name}</span><div class="bar-track"><div class="bar-fill" style="width:${(m.tasks.length/mx*100)}%;background:${m.color}">${m.tasks.length}</div></div></div>`).join('');

    // Status donut
    const allTasks = members.flatMap(m => m.tasks || []);
    const c = { total: allTasks.length, ongoing: allTasks.filter(t => t.status === 'ongoing').length, done: allTasks.filter(t => t.status === 'done').length, pending: allTasks.filter(t => t.status === 'pending').length, delayed: allTasks.filter(t => t.status === 'delayed').length };
    const dd = [{l:'进行中',v:c.ongoing,c:'#448aff'},{l:'已完成',v:c.done,c:'#00e676'},{l:'待启动',v:c.pending,c:'#ffe000'},{l:'已延期',v:c.delayed,c:'#ff4444'}];
    const tot = dd.reduce((s,d) => s+d.v, 0) || 1;
    let dp='',ca=-90;
    dd.forEach(d => { if(!d.v)return; const a=(d.v/tot)*360; const sr=ca*Math.PI/180; const er=(ca+a)*Math.PI/180; const r=45,cx=56,cy=56; dp+=`<path d="M${cx},${cy} L${cx+r*Math.cos(sr)},${cy+r*Math.sin(sr)} A${r},${r} 0 ${a>180?1:0},1 ${cx+r*Math.cos(er)},${cy+r*Math.sin(er)} Z" fill="${d.c}" opacity="0.8"/>`; ca+=a; });
    dp+=`<circle cx="56" cy="56" r="26" fill="var(--surface)"/>`;
    dp+=`<text x="56" y="53" text-anchor="middle" fill="var(--yellow)" font-family="Bebas Neue,sans-serif" font-size="18">${dd.reduce((s,d)=>s+d.v,0)}</text>`;
    dp+=`<text x="56" y="66" text-anchor="middle" fill="var(--text-dim)" font-size="8" letter-spacing="1">TOTAL</text>`;
    const leg = dd.map(d => `<div class="legend-item"><div class="legend-dot" style="background:${d.c}"></div><span class="legend-label">${d.l}</span><span class="legend-value">${d.v}</span></div>`).join('');

    // Rank
    const ranks = sorted.slice(0, 4).map((m,i) => { const cls=i===0?'gold':i===1?'silver':i===2?'bronze':'normal'; return `<div class="rank-item"><div class="rank-num ${cls}">${i+1}</div><span class="rank-name">${m.name}</span><span class="rank-count">${m.tasks.length}</span></div>`; }).join('');

    return `
      <div class="chart-panel"><h3>个人需求量</h3><div class="bar-chart">${bars}</div></div>
      <div class="chart-panel"><h3>状态分布</h3><div class="donut-area"><svg class="donut-svg" width="112" height="112" viewBox="0 0 112 112">${dp}</svg><div class="donut-legend">${leg}</div></div></div>
      <div class="chart-panel"><h3>工作量排行</h3><div class="rank-list">${ranks}</div></div>
    `;
  }

  document.getElementById('sidebar').innerHTML =
    `<div class="sidebar-split">
       <div class="sidebar-col">
         <div style="border-left:3px solid var(--yellow);padding-left:10px;font-size:13px;font-weight:900;letter-spacing:2px;color:var(--yellow);margin-bottom:4px;display:flex;align-items:center;gap:6px;">
           👥 员工组 <span style="font-family:'Bebas Neue',sans-serif;color:var(--text-dim);font-size:11px;margin-left:auto;">${empMembers.length}人</span>
         </div>
         ${buildColumn(empMembers)}
       </div>
       <div class="sidebar-col">
         <div style="border-left:3px solid #00e676;padding-left:10px;font-size:13px;font-weight:900;letter-spacing:2px;color:#00e676;margin-bottom:4px;display:flex;align-items:center;gap:6px;">
           🟢 CP 组 <span style="font-family:'Bebas Neue',sans-serif;color:var(--text-dim);font-size:11px;margin-left:auto;">${cpMembers.length}人</span>
         </div>
         ${buildColumn(cpMembers)}
       </div>
     </div>`;

  } catch(e) { console.error('[BOARD] renderSidebar error:', e); document.getElementById('sidebar').innerHTML=''; }
}

function switchTab(t) { currentTab=t; renderTabs(); renderTable(); renderSidebar(); }

function exportData() { const b=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download='teamboard_'+new Date().toISOString().slice(0,10)+'.json'; a.click(); URL.revokeObjectURL(u); showToast('已导出JSON'); }

function exportExcel() {
  const statusMap = {ongoing:'进行中',done:'已完成',delayed:'已延期',pending:'待启动'};
  const groupMap = {design:'平面组',video:'视频组',cp:'CP组',other:'其他'};
  const rows = [['分组','员工','需求名称','启动日期','交付节点','进度(%)','优先级','状态','备注']];
  ['design','video','cp','other'].forEach(gk => {
    if (!DATA[gk]) return;
    DATA[gk].members.forEach(m => {
      if (!m.tasks.length) {
        rows.push([groupMap[gk]||gk, m.name, '', '', '', '', '', '', '']);
      }
      m.tasks.forEach(t => {
        rows.push([
          groupMap[gk]||gk,
          m.name,
          t.name,
          t.start,
          t.deadline,
          t.progress,
          t.priority||'P2',
          statusMap[t.status]||t.status,
          (t.note||'').replace(/\n/g,' ')
        ]);
      });
    });
  });

  // Build CSV with BOM for Excel Chinese support
  let csv = '\uFEFF';
  rows.forEach(r => {
    csv += r.map(c => {
      const s = String(c==null?'':c);
      return s.indexOf(',')>-1 || s.indexOf('"')>-1 || s.indexOf('\n')>-1 ? '"'+s.replace(/"/g,'""')+'"' : s;
    }).join(',') + '\r\n';
  });

  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '工作量看板_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('已导出 Excel');
}
